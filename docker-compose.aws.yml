# Overrides for EC2 deployment. Used alongside the base docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.aws.yml up --build -d
#
# Changes vs local:
#   ui: passes --allowed-hosts all so Vite accepts requests from the EC2 public IP/DNS

services:
  ui:
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "5173", "--allowed-hosts", "all"]
